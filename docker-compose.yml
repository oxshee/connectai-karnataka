version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: connectai-postgis
    environment:
      POSTGRES_DB: connectai_karnataka
      POSTGRES_USER: connectai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-connectai_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectai -d connectai_karnataka"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectai-api
    environment:
      DATABASE_URL: postgresql://connectai:${DB_PASSWORD:-connectai_dev}@db:5432/connectai_karnataka
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/v1}
    container_name: connectai-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
    name: connectai-karnataka-pgdata
